name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container: odoo:17.0

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U odoo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install module and run tests
        run: |
          odoo \
            --stop-after-init \
            --no-http \
            --db_host db \
            --db_port 5432 \
            --db_user odoo \
            --db_password odoo \
            --database ci_test_db \
            --addons-path=/usr/lib/python3/dist-packages/odoo/addons,${GITHUB_WORKSPACE} \
            --init sales_crm \
            --test-enable \
            --test-tags=/sales_crm \
            --log-level=test
