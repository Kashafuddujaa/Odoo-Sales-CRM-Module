[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
; Admin master password for the database manager. Change this in any real deployment.
admin_passwd = admin
; Comma-separated list of databases exposed by the web UI (blank = all).
dbfilter = .*
; Development conveniences: reload on change and readable assets.
dev_mode = reload,qweb,werkzeug,xml
log_level = info
list_db = True
