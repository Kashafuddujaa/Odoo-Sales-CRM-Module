services:
  db:
    image: postgres:15
    container_name: sales_crm_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:17.0
    container_name: sales_crm_odoo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
      - ./sales_crm:/mnt/extra-addons/sales_crm:ro
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    command: odoo -c /etc/odoo/odoo.conf

volumes:
  odoo-db-data:
  odoo-web-data:
